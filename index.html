<!DOCTYPE html>
<html>
<head>
    <title>Display Antrian</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Backup auto reload -->
    <meta http-equiv="refresh" content="600">

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }

        .container {
            width: 90%;
        }

        h1 {
            font-size: 40px;
            margin-bottom: 20px;
        }

        .current {
            font-size: 150px;
            font-weight: bold;
            margin: 20px 0;
            transition: 0.3s;
        }

        .next {
            font-size: 40px;
            opacity: 0.7;
        }

        .info {
            margin-top: 20px;
            font-size: 16px;
            opacity: 0.6;
        }

        .blink {
            animation: pop 0.6s ease;
        }

        @keyframes pop {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }

        .fullscreen-btn {
            position: absolute;
            bottom: 20px;
            right: 20px;
            padding: 10px 15px;
            background: white;
            color: black;
            border: none;
            cursor: pointer;
            border-radius: 5px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>NOMOR ANTRIAN</h1>

    <div class="current" id="currentNumber">-</div>

    <div class="next">
        Selanjutnya: <span id="nextNumber">-</span>
    </div>

    <div class="info">
        Update otomatis setiap 3 detik <br>
        Terakhir update: <span id="lastUpdate">-</span>
    </div>
</div>

<button class="fullscreen-btn" onclick="goFullscreen()">Fullscreen</button>

<script>
    const scriptURL = "https://script.google.com/macros/s/AKfycbwHx_RQwS-bOC4pN5SPFh-Kb78M0eoiPIguzCQlkFAX3iGcFCY7hEf73IaocilqL4QGvg/exec";
    let lastNumber = null;

    function speakNumber(number) {
        const msg = new SpeechSynthesisUtterance(
            "Nomor antrian " + number + ", silakan menuju loket."
        );
        msg.lang = "id-ID";
        msg.rate = 0.9;
        speechSynthesis.speak(msg);
    }

    async function loadData() {
        try {
            const response = await fetch(scriptURL);
            const text = await response.text();

            console.log("Raw response:", text); // DEBUG

            const data = JSON.parse(text);

            if (!data.nomor) {
                console.error("Format JSON salah:", data);
                return;
            }

            const current = parseInt(data.nomor);
            const next = current + 1;

            if (current !== lastNumber) {

                document.getElementById("currentNumber").innerText = current;
                document.getElementById("nextNumber").innerText = next;

                document.getElementById("currentNumber").classList.add("blink");

                setTimeout(() => {
                    document.getElementById("currentNumber").classList.remove("blink");
                }, 600);

                speakNumber(current);

                lastNumber = current;
            }

            document.getElementById("lastUpdate").innerText =
                new Date().toLocaleTimeString();

        } catch (error) {
            console.error("ERROR FETCH:", error);
        }
    }

    function goFullscreen() {
        document.documentElement.requestFullscreen();
    }

    loadData();
    setInterval(loadData, 3000);
</script>

</body>
</html>
