<!DOCTYPE html>
<html>
<head>
    <title>Nomor Antrian</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Auto reload full page tiap 5 menit (backup jika koneksi error) -->
    <meta http-equiv="refresh" content="300">

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
            text-align: center;
        }
        .card {
            background: rgba(255,255,255,0.1);
            padding: 50px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            width: 90%;
            max-width: 600px;
        }
        h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }
        #nomor {
            font-size: 120px;
            font-weight: bold;
            margin: 20px 0;
            transition: 0.3s ease;
        }
        .update-info {
            font-size: 14px;
            opacity: 0.7;
        }
        .blink {
            animation: blink 0.6s ease;
        }
        @keyframes blink {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>

<div class="card">
    <h1>NOMOR ANTRIAN SAAT INI</h1>
    <div id="nomor">-</div>
    <div class="update-info">
        Update otomatis setiap 3 detik
        <br>
        Terakhir update: <span id="lastUpdate">-</span>
    </div>
</div>

<script>
    const scriptURL = "https://script.google.com/macros/s/AKfycbypb4qhwig6XkXp5bxgJ3rc0K3MQZC8jJjNnO0_aWucZrPgnBy8oak3BCWTPC6wxi-4pg/exec";
    let nomorSebelumnya = null;

    function loadData() {
        fetch(scriptURL)
            .then(res => res.json())
            .then(data => {
                const nomorBaru = data.nomor;
                const nomorElement = document.getElementById("nomor");

                if (nomorBaru !== nomorSebelumnya) {
                    nomorElement.innerText = nomorBaru;
                    nomorElement.classList.add("blink");

                    setTimeout(() => {
                        nomorElement.classList.remove("blink");
                    }, 600);

                    nomorSebelumnya = nomorBaru;
                }

                document.getElementById("lastUpdate").innerText =
                    new Date().toLocaleTimeString();
            })
            .catch(() => {
                console.log("Gagal mengambil data...");
            });
    }

    // Load pertama kali
    loadData();

    // AUTO UPDATE tiap 3 detik
    setInterval(loadData, 3000);
</script>

</body>
</html>
