<!DOCTYPE html>
<html>
<head>
    <title>Nomor Antrian</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
            text-align: center;
        }
        .card {
            background: rgba(255,255,255,0.1);
            padding: 40px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
        }
        h1 {
            font-size: 30px;
        }
        #nomor {
            font-size: 100px;
            font-weight: bold;
            margin-top: 20px;
        }
    </style>
</head>
<body>

<div class="card">
    <h1>NOMOR ANTRIAN SAAT INI</h1>
    <div id="nomor">-</div>
</div>

<script>
    const scriptURL = "YOUR_APPS_SCRIPT_URL";

    function loadData() {
        fetch(scriptURL)
            .then(res => res.json())
            .then(data => {
                document.getElementById("nomor").innerText = data.nomor;
            });
    }

    loadData();
    setInterval(loadData, 3000);
</script>

</body>
</html>
